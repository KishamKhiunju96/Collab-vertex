name: Frontend CI/CD

on:
  push:
    branches:
      - main  # or your production branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3️⃣ Build &Push Docker image
    - name: Build and Push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: kishamkhiunju/collab-frontend:latest

    
    # 5️⃣ SSH to server and deploy
    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.9
      with:
        host: ${{ secrets.SERVER_HOST }}       # e.g., 98.70.43.89
        username: ${{ secrets.SERVER_USER }}   # e.g., azureuser
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd /home/azureuser
          docker pull kishamkhiunju/collab-frontend:latest
          docker compose up -d 
