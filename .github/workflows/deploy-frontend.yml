name: Frontend CI/CD

on:
  push:
    branches:
      - main  # or your production branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3️⃣ Build Docker image
    - name: Build Docker image
      run: |
        docker build -t kishamkhiunju/collab-frontend:latest .

    # 4️⃣ Push Docker image
    - name: Push Docker image
      run: |
        docker push kishamkhiunju/collab-frontend:latest

    # 5️⃣ SSH to server and deploy
    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.SERVER_HOST }}       # e.g., 98.70.43.89
        username: ${{ secrets.SERVER_USER }}   # e.g., azureuser
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /home/azureuser
          docker compose pull frontend
          docker compose up -d frontend